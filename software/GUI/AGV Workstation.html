// ── Log generator ────────────────────────────────────────────────────────────
function useLogStream(connected, telem, telemTimeout) {
  const [logs, setLogs] = React.useState([
    { ts: '00:00:00', level: 'INFO', msg: 'Workstation initialized.' },
  ]);
  const prevConnected = React.useRef(false);
  const prevEstop = React.useRef(false);
  const prevFunc = React.useRef(telem.func);
  const prevMode = React.useRef(telem.mode);
  const uptimeRef = React.useRef(telem.uptime);
  uptimeRef.current = telem.uptime;

  function addLog(level, msg) {
    const ts = fmtUptime(uptimeRef.current);
    setLogs(l => [...l.slice(-199), { ts, level, msg }]);
  }

  // Append a parsed PKT_LOG entry from firmware. parseLogEntry() returns
  // { timestamp_ms, level, code, msg } — accept either that or a pre-shaped
  // {ts, level, msg} object. Levels map: 0=DEBUG, 1=INFO, 2=WARN, 3=ERROR.
  function pushExternalLog(entry) {
    const LEVEL = ['DEBUG', 'INFO', 'WARN', 'ERROR'];
    const ts = entry.ts ?? fmtUptime((entry.timestamp_ms ?? 0) / 1000);
    const level = entry.level && typeof entry.level === 'string'
      ? entry.level
      : (LEVEL[entry.level] ?? 'INFO');
    const msg = entry.msg ?? `code 0x${(entry.code ?? 0).toString(16)}`;
    setLogs(l => [...l.slice(-199), { ts, level, msg, fromFirmware: true }]);
  }

  React.useEffect(() => {
    if (connected && !prevConnected.current) addLog('INFO', 'WebSocket connected to ESP32 bridge.');
    if (!connected && prevConnected.current)  addLog('WARN', 'WebSocket disconnected.');
    prevConnected.current = connected;
  }, [connected]);

  React.useEffect(() => {
    if (telem.estop.active && !prevEstop.current) addLog('ESTOP', 'E-STOP triggered — ' + (telem.estop.sources[0] || 'unknown source'));
    if (!telem.estop.active && prevEstop.current) addLog('OK', 'E-STOP cleared. System ready.');
    prevEstop.current = telem.estop.active;
  }, [telem.estop.active]);

  React.useEffect(() => {
    if (telem.func !== prevFunc.current) addLog('INFO', `Function → ${telem.func}`);
    prevFunc.current = telem.func;
  }, [telem.func]);

  React.useEffect(() => {
    if (telem.mode !== prevMode.current) addLog('INFO', `Mode → ${telem.mode}`);
    prevMode.current = telem.mode;
  }, [telem.mode]);

  React.useEffect(() => {
    const interval = setInterval(() => {
      if (connected && Math.random() < 0.04) addLog('DEBUG', `Heartbeat OK — latency ${telem.comms.latency}ms`);
    }, 2000);
    return () => clearInterval(interval);
  }, [connected, telem.comms.latency]);

  const prevTelemTimeout = React.useRef(false);
  React.useEffect(() => {
    if (telemTimeout && !prevTelemTimeout.current) addLog('WARN', 'STM32 telemetry timeout — no data for 2 s. Display frozen.');
    if (!telemTimeout && prevTelemTimeout.current) addLog('INFO', 'STM32 telemetry resumed.');
    prevTelemTimeout.current = telemTimeout;
  }, [telemTimeout]);

  return { logs, pushExternalLog };
}

// ── Proximity sensor widget ───────────────────────────────────────────────────
// Shows AGV outline (top-down) with 4 corner sensors lit when triggered
function ProxWidget({ prox, theme }) {
  const anyTriggered = prox.front || prox.rear || prox.left || prox.right;
  const S = (active) => ({
    width: '7px', height: '7px', borderRadius: '50%',
    background: active ? theme.danger : theme.border,
    boxShadow: active ? `0 0 5px ${theme.danger}` : 'none',
    transition: 'all 0.08s',
    flexShrink: 0,
  });
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2px' }}>
      <div style={{ fontSize: '9px', fontFamily: theme.monoFont, color: anyTriggered ? theme.danger : theme.muted, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Prox</div>
      {/* Top-down AGV layout: 2×2 corner grid */}
      <div style={{ display: 'grid', gridTemplateColumns: '7px 12px 7px', gridTemplateRows: '7px 10px 7px', gap: '2px', alignItems: 'center', justifyItems: 'center' }}>
        {/* FL */}
        <div style={S(prox.front || prox.left)}></div>
        {/* Front center — arrow */}
        <div style={{ fontSize: '8px', color: prox.front ? theme.danger : theme.muted, textAlign: 'center' }}>▲</div>
        {/* FR */}
        <div style={S(prox.front || prox.right)}></div>
        {/* Left */}
        <div style={{ fontSize: '8px', color: prox.left ? theme.danger : theme.muted }}>◀</div>
        {/* AGV body */}

        {/* Right */}
        <div style={{ fontSize: '8px', color: prox.right ? theme.danger : theme.muted }}>▶</div>
        {/* RL */}
        <div style={S(prox.rear || prox.left)}></div>
        {/* Rear */}
        <div style={{ fontSize: '8px', color: prox.rear ? theme.danger : theme.muted, textAlign: 'center' }}>▼</div>
        {/* RR */}
        <div style={S(prox.rear || prox.right)}></div>
      </div>
    </div>
  );
}

// ── Tab bar (outside App so it doesn't remount on every render) ───────────────

  return (
    <div style={{ display: 'flex', background: theme.tabBg, borderTop: `1px solid ${theme.border}`, height: `${tabH}px`, flexShrink: 0, overflowX: 'auto' }}>
      {TABS.map(tab => {
        const active = activeTab === tab.id;
        return (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)}
            style={{
              flex: '0 0 auto', minWidth: '90px', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '2px',
              background: active ? theme.tabActiveBg : 'transparent',
              border: 'none', borderTop: `2px solid ${active ? theme.accent : 'transparent'}`,
              cursor: 'pointer', padding: '0 10px', transition: 'all 0.12s',
            }}>
            <span style={{ fontSize: '16px', color: active ? theme.accent : theme.muted }}>{tab.icon}</span>
            <span style={{ fontSize: '9px', fontFamily: theme.monoFont, fontWeight: active ? 700 : 400, color: active ? theme.fg : theme.muted, letterSpacing: '0.06em', textTransform: 'uppercase' }}>{tab.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = THEMES[tweaks.theme] || THEMES.clinical;

  const [connected, setConnected] = React.useState(false);
  const [wsUrl, setWsUrl] = React.useState('ws://192.168.4.1/ws');
  const [activeTab, setActiveTab] = React.useState('dashboard');
  const [showEstopModal, setShowEstopModal] = React.useState(false);
  const [showSettings, setShowSettings] = React.useState(false);

  const { telem, telemTimeout, setFunc: setFuncLocal, setMode: setModeLocal, triggerEstop: triggerEstopLocal, clearEstop, setCaution: setLocalCaution, applyRealTelemetry, updateCommsStats } = useTelemetry(connected);
  const externalLogRef = React.useRef(null);
  const { logs, pushExternalLog } = useLogStream(connected, telem, telemTimeout);
  externalLogRef.current = pushExternalLog;

  // Real WebSocket protocol layer
  const agv = useAGVWebSocket({
    url: wsUrl,
    onConnected: () => setConnected(true),
    onDisconnected: () => setConnected(false),
    onTelemetry: (t) => { if (t) applyRealTelemetry(t); },
    onLog: (entry) => { if (entry && externalLogRef.current) externalLogRef.current(entry); },
    onNack: (seq, code) => console.warn('[agv] NACK seq', seq, 'code', code),
    onStats: updateCommsStats,
  });

  // Wrapper to send caution override to firmware
  async function setCaution(level) {
    const map = { NORMAL: 1.0, CAUTION: 0.5, CRITICAL: 0.2 };
    const scalar = map[level] ?? 1.0;
    setLocalCaution(level);
    if (connected) {
      try { await agv.cmdOverrideCaution(scalar); }
      catch(e) { console.warn('[agv] setCaution failed:', e.message); }
    }
  }
  window._setCaution = setCaution;

  // Wrap command functions to send real packets when connected, and update local state
  async function setFunc(f) {
    const funcId = AGV_PROTO.FUNC[f] ?? 0;
    setFuncLocal(f);
    if (connected) {
      try { await agv.cmdSetFunction(funcId); }
      catch(e) { console.warn('[agv] setFunction failed:', e.message); }
    }
  }
  async function setMode(m) {
    const modeId = AGV_PROTO.MODE[m] ?? 0;
    setModeLocal(m);
    if (connected) {
      try { await agv.cmdSetMode(modeId); }
      catch(e) { console.warn('[agv] setMode failed:', e.message); }
    }
  }
  async function triggerEstop() {
    triggerEstopLocal();
    if (connected) {
      try { await agv.cmdVirtualEstop(); }
      catch(e) { console.warn('[agv] estop failed:', e.message); }
    }
  }
  async function clearEstopFull() {
    clearEstop();
    if (connected) {
      try { await agv.cmdClearAllEstop(); }
      catch(e) { console.warn('[agv] clearEstop failed:', e.message); }
    }
  }

  function handleConnect() { agv.connect(); }
  function handleDisconnect() { agv.disconnect(); }

  // ── Remote Control keyboard + streaming (global — active on any tab) ─────
  const [rcPressed, setRcPressed] = React.useState({ fwd: false, back: false, left: false, right: false });
  const [rcSpeed, setRcSpeed] = React.useState(0.3);
  const rcActive = telem.func === 'REMOTE_CONTROL' && !telem.estop.active;

  React.useEffect(() => {
    const onKey = (e) => {
      const t = e.target;
      if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT') return;
      const map = { ArrowUp: 'fwd', w: 'fwd', ArrowDown: 'back', s: 'back', ArrowLeft: 'left', a: 'left', ArrowRight: 'right', d: 'right' };
      const dir = map[e.key];
      if (!dir) return;
      e.preventDefault();
      setRcPressed(p => ({ ...p, [dir]: e.type === 'keydown' }));
    };
    window.addEventListener('keydown', onKey);
    window.addEventListener('keyup', onKey);
    return () => { window.removeEventListener('keydown', onKey); window.removeEventListener('keyup', onKey); };
  }, []);

  const rcVRef = React.useRef(0);
  const rcOmegaRef = React.useRef(0);
  React.useEffect(() => {
    if (!rcActive || !connected || !agv) return;
    const handle = setInterval(() => {
      try { agv.cmdVelCmd(rcVRef.current, rcOmegaRef.current); } catch (_) {}
    }, 50);
    return () => clearInterval(handle);
  }, [rcActive, connected, agv]);

  const rcV = (rcPressed.fwd ? rcSpeed : 0) - (rcPressed.back ? rcSpeed : 0);
  // Firmware convention: ω > 0 = CCW (left turn). So left-arrow → +ω, right → −ω.
  const rcOmega = (rcPressed.left ? rcSpeed * 2 : 0) - (rcPressed.right ? rcSpeed * 2 : 0);
  rcVRef.current = rcActive ? rcV : 0;
  rcOmegaRef.current = rcActive ? rcOmega : 0;

  const estopActive = telem.estop.active;

  const headerH = tweaks.compactHeader ? 52 : 64;
  const tabH = 54;

  function MiniStat({ label, value, color }) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', minWidth: '56px' }}>
        <div style={{ fontSize: '9px', fontFamily: theme.monoFont, color: theme.muted, letterSpacing: '0.1em', textTransform: 'uppercase' }}>{label}</div>
        <div style={{ fontSize: tweaks.compactHeader ? '12px' : '14px', fontFamily: theme.monoFont, fontWeight: 700, color: color || theme.fg }}>{value}</div>
      </div>
    );
  }

  const contentH = `calc(100vh - ${headerH}px - ${tabH}px)`;

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: theme.bg, color: theme.fg, overflow: 'hidden' }}>

      {/* ── HEADER ── */}
      <div style={{ height: `${headerH}px`, flexShrink: 0, background: theme.headerBg, borderBottom: `1px solid ${theme.border}`, display: 'flex', alignItems: 'center', paddingLeft: '16px', paddingRight: '12px', gap: '16px' }}>
        {/* Logo / title */}
        <div style={{ display: 'flex', flexDirection: 'column', marginRight: '8px' }}>
          <span style={{ fontSize: tweaks.compactHeader ? '12px' : '14px', fontFamily: theme.monoFont, fontWeight: 700, color: theme.fg, letterSpacing: '0.08em' }}>AGV</span>
          <span style={{ fontSize: '8px', fontFamily: theme.monoFont, color: theme.muted, letterSpacing: '0.14em', textTransform: 'uppercase' }}>Workstation</span>
        </div>

        {/* Divider */}
        <div style={{ width: '1px', height: '30px', background: theme.border }} />

        {/* Connection indicator */}
        <div style={{ display: 'flex', alignItems: 'center', gap: '6px', cursor: 'pointer' }} onClick={() => setActiveTab('comms')}>
          <div style={{ width: '7px', height: '7px', borderRadius: '50%', background: connected ? theme.success : theme.muted, boxShadow: connected ? `0 0 6px ${theme.success}` : 'none' }} />
          <span style={{ fontSize: '10px', fontFamily: theme.monoFont, color: connected ? theme.success : theme.muted }}>{connected ? 'LINK' : 'NO LINK'}</span>
        </div>

        <div style={{ width: '1px', height: '30px', background: theme.border }} />

        {/* Telemetry mini stats */}
        <div style={{ display: 'flex', gap: '6px', flex: 1, overflowX: 'auto', alignItems: 'center' }}>
          <MiniStat label="Mode" value={telem.mode === 'SUPERVISED' ? 'SUP' : 'UNSUP'} color={telem.mode === 'SUPERVISED' ? theme.accent : theme.warn} />
          <div style={{ width: '1px', height: '30px', background: theme.border, alignSelf: 'center' }} />
          <MiniStat label="Func" value={telem.func.replace(/_/g, ' ').replace('FOLLOW', 'FLW')} />
          <div style={{ width: '1px', height: '30px', background: theme.border, alignSelf: 'center' }} />
          <MiniStat label="Speed" value={fmt(telem.velocity.v, 2, 'm/s')} color={theme.accent} />
          <div style={{ width: '1px', height: '30px', background: theme.border, alignSelf: 'center' }} />
          <MiniStat label="Load" value={fmt(telem.loadCells.total, 1, 'kg')} />
          <div style={{ width: '1px', height: '30px', background: theme.border, alignSelf: 'center' }} />
          <MiniStat label="Caution" value={(telem.caution.modifier * 100).toFixed(0) + '%'} color={telem.caution.level === 'NORMAL' ? theme.success : telem.caution.level === 'CAUTION' ? theme.warn : theme.danger} />
          <div style={{ width: '1px', height: '30px', background: theme.border, alignSelf: 'center' }} />
          <MiniStat label="Uptime" value={fmtUptime(telem.uptime)} />
          {connected && (
            <>
              <div style={{ width: '1px', height: '30px', background: theme.border, alignSelf: 'center' }} />
              <MiniStat label="Ping" value={telem.comms.latency + 'ms'} />
            </>
          )}
          <div style={{ width: '1px', height: '30px', background: theme.border, alignSelf: 'center' }} />
          <ProxWidget prox={telem.proximity} theme={theme} />
        </div>

        {/* Right side controls */}
        <div style={{ display: 'flex', gap: '8px', alignItems: 'center', flexShrink: 0 }}>
          {/* Connect/disconnect quick button */}
          {!connected ? (
            <button onClick={handleConnect}
              style={{ padding: '7px 14px', background: theme.accent, border: 'none', borderRadius: '7px', color: '#fff', fontSize: '11px', fontFamily: theme.monoFont, fontWeight: 700, cursor: 'pointer' }}>
              Connect
            </button>
          ) : (
            <button onClick={handleDisconnect}
              style={{ padding: '7px 14px', background: 'transparent', border: `1px solid ${theme.border}`, borderRadius: '7px', color: theme.muted, fontSize: '11px', fontFamily: theme.monoFont, cursor: 'pointer' }}>
              Disconnect
            </button>
          )}

          {/* Theme switcher */}
          <div style={{ display: 'flex', gap: '3px', background: theme.bg, border: `1px solid ${theme.border}`, borderRadius: '8px', padding: '3px' }}>
            {[['clinical','☀'],['dark','☾']].map(([t, lbl]) => (
              <button key={t} onClick={() => setTweak('theme', t)}
                style={{ width: '28px', height: '28px', borderRadius: '5px', border: 'none', fontSize: '13px', cursor: 'pointer', background: tweaks.theme === t ? theme.accent : 'transparent', color: tweaks.theme === t ? '#fff' : theme.muted, transition: 'all 0.12s' }}>
                {lbl}
              </button>
            ))}
          </div>

          {/* Settings */}
          <button onClick={() => setShowSettings(true)}
            style={{ width: '34px', height: '34px', borderRadius: '8px', border: `1px solid ${theme.border}`, background: 'transparent', color: theme.muted, fontSize: '16px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            ⚙
          </button>

          {/* E-STOP button */}
          <button
            onClick={() => {
              if (estopActive) { setShowEstopModal(true); }
              else { triggerEstop(); setShowEstopModal(true); }
            }}
            style={{
              padding: tweaks.compactHeader ? '7px 14px' : '9px 18px',
              background: estopActive ? theme.cardBg : theme.danger,
              border: `2px solid ${theme.danger}`,
              borderRadius: '8px',
              color: estopActive ? theme.danger : '#fff',
              fontSize: tweaks.compactHeader ? '11px' : '13px',
              fontFamily: theme.monoFont, fontWeight: 700, cursor: 'pointer',
              transition: 'all 0.2s',
            }}>
            {estopActive ? '⚠ E-STOP' : '⛔ E-STOP'}
          </button>
        </div>
      </div>

      {/* ── CONTENT ── */}
      <div style={{ flex: 1, overflow: 'hidden', height: contentH }}>
        {activeTab === 'dashboard'    && <DashboardTab telem={telem} setFunc={setFunc} setMode={setMode} theme={theme} agv={agv} connected={connected} rcPressed={rcPressed} setRcPressed={setRcPressed} rcSpeed={rcSpeed} setRcSpeed={setRcSpeed} rcV={rcV} rcOmega={rcOmega} />}
        {activeTab === 'telemetry'    && <TelemetryTab telem={telem} theme={theme} rcActive={rcActive} rcV={rcV} rcOmega={rcOmega} rcPressed={rcPressed} />}
        {activeTab === 'map'          && <MapTab telem={telem} theme={theme} />}
        {activeTab === 'trajectory'   && <TrajectoryTab telem={telem} theme={theme} />}
        {activeTab === 'pid'          && <PIDTab theme={theme} agv={agv} connected={connected} telem={telem} />}
        {activeTab === 'ramp'         && <RampTab theme={theme} agv={agv} connected={connected} />}
        {activeTab === 'logs'         && <LogsTab logs={logs} theme={theme} agv={agv} connected={connected} />}
        {activeTab === 'unsupervised' && <UnsupervisedTab telem={telem} setFunc={setFunc} setMode={setMode} theme={theme} />}
        {activeTab === 'comms'        && <CommsTab telem={telem} connected={connected} onConnect={handleConnect} onDisconnect={handleDisconnect} wsUrl={wsUrl} setWsUrl={setWsUrl} theme={theme} agv={agv} />}
      </div>

      {/* ── TAB BAR ── */}
      <TabBar activeTab={activeTab} setActiveTab={setActiveTab} theme={theme} tabH={tabH} />

      {/* ── MODALS ── */}
      {showEstopModal && <EstopModal telem={telem} onClear={() => { clearEstopFull(); }} onClose={() => { setShowEstopModal(false); }} theme={theme} />}
      {showSettings   && <SettingsModal onClose={() => setShowSettings(false)} theme={theme} wsUrl={wsUrl} setWsUrl={setWsUrl} />}

      {/* ── TWEAKS PANEL ── */}
      <TweaksPanel>
        <TweakSection label="Visual Theme" />
        <TweakRadio label="Theme" value={tweaks.theme}
          options={['clinical','dark']}
          onChange={v => setTweak('theme', v)} />
        <TweakSection label="Layout" />
        <TweakToggle label="Compact header" value={tweaks.compactHeader}
          onChange={v => setTweak('compactHeader', v)} />
      </TweaksPanel>

      <style>{`
        @keyframes estop-pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.5; transform: scale(1.05); }
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
