[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

; Each module lives in its own folder under src/. PlatformIO auto-discovers
; .cpp files recursively, but include paths for subfolders must be listed
; explicitly. Add -Isrc/<module> when adding a new module folder.
build_flags =
    -Wall
    -Wextra
    -DCORE_DEBUG_LEVEL=1
    -Isrc/crc
    -Isrc/frame
    -Isrc/stacklight

lib_deps =
    me-no-dev/ESPAsyncWebServer @ ^1.2.3
    me-no-dev/AsyncTCP @ ^1.1.1
