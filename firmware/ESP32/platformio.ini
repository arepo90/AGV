[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 921600

; ARDUINO_USB_MODE=1 selects the C3's hardware USB Serial/JTAG (HWCDC) — the
; C3 has no TinyUSB peripheral, so this flag is mandatory on this chip when
; ARDUINO_USB_CDC_ON_BOOT=1 is also set. Together they map `Serial` to the
; native USB port, which is the line physically wired to the Jetson on the
; SuperMini. UART0's default pins (20/21) are then free for UART1's STM32 link.
;
; Each module lives in its own folder under src/. PlatformIO auto-discovers
; .cpp files recursively, but include paths for subfolders must be listed
; explicitly. Add -Isrc/<module> when adding a new module folder.
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0

build_flags =
    -Wall
    -Wextra
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Isrc/battery
    -Isrc/crc
    -Isrc/frame
    -Isrc/ledring
    -Isrc/status_led
